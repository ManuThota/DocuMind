# ──────────────────────────────────────────────────────
# DocuMind — CI/CD Pipeline
# Triggers on every push to main and on pull requests
#
# Jobs:
#   1. test    — install deps, lint, run checks
#   2. docker  — build image, push to Docker Hub  (main only)
# ──────────────────────────────────────────────────────

name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  # Change this to your Docker Hub username/repo-name
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/documind

jobs:

  # ── Job 1: Install & Test ──────────────────────────
  test:
    name: Install & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"               # cache pip deps between runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Tesseract (for import checks)
        run: sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Verify all imports resolve
        run: |
          python -c "from backend.services.pdf_parser   import PDFParser"
          python -c "from backend.services.ocr_parser   import OCRParser"
          python -c "from backend.services.text_chunker import TextChunker"
          python -c "from backend.services.embeddings   import EmbeddingService"
          python -c "from backend.services.vector_store import VectorStore"
          python -c "from backend.services.reranker     import BM25Reranker"
          python -c "from backend.services.rag_pipeline import RAGPipeline"
          echo "All imports OK"

      - name: Verify FastAPI app loads
        run: |
          python -c "from backend.main import app; print('FastAPI app OK')"

  # ── Job 2: Build & Push Docker Image ──────────────
  docker:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test                      # only runs if test job passes
    if: github.event_name == 'push'  # skip on pull requests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up QEMU for multi-platform builds (amd64 + arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx (needed for multi-platform + cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub using secrets you set in GitHub repo settings
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Generate image tags:
      #   - latest          (always, on main)
      #   - sha-<commit>    (unique per commit for rollback)
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      # Build and push (uses layer cache from Docker Hub to speed up rebuilds)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Print pushed image info
        run: |
          echo "✅ Pushed image: ${{ env.IMAGE_NAME }}"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}"