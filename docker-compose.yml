# ──────────────────────────────────────────────────────────────
# DocuMind — Local Docker Compose
# Uses Ollama locally. On Render, set GROQ_API_KEY instead.
# ──────────────────────────────────────────────────────────────

services:

  ollama:
    image: ollama/ollama:latest
    container_name: knowledge-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=1
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 30s
      retries: 15
      start_period: 10s
    networks:
      - knowledge-net

  ollama-init:
    image: ollama/ollama:latest
    container_name: knowledge-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "export OLLAMA_HOST=http://ollama:11434 &&
      ollama pull llama3.2:3b &&
      ollama pull nomic-embed-text &&
      echo 'Models ready!'"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - knowledge-net
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_LLM_MODEL=llama3.2:3b
      # For Groq instead of Ollama locally, uncomment:
      # - GROQ_API_KEY=your_key_here
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/database:/app/backend/database
    networks:
      - knowledge-net

volumes:
  ollama-data:

networks:
  knowledge-net:
    driver: bridge